services:
  mysql:
    image: mysql:8.0
    container_name: mxfacil-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: mxfacil
      MYSQL_USER: mxfacil_user
      MYSQL_PASSWORD: mxfacil_pass123
    ports:
      - "3307:3306"
    volumes:
      - mxfacil_mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/1-init.sql:ro
    command: ["--default-authentication-plugin=mysql_native_password"]

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: mxfacil-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8081:80"
    depends_on:
      - mysql

  backend:
    build: .
    container_name: mxfacil-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - mysql

volumes:
  mxfacil_mysql_data: