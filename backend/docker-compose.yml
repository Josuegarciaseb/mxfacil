version: '3.9'

services:
  # ─── Base de Datos MySQL ───────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: mxfacil_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-mxfacil}
      MYSQL_USER:          ${MYSQL_USER:-mxfacil_user}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-mxfacil_pass}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - mxfacil_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Node.js con HTTPS ─────────────────────────────────────────────
  backend:
    build: .
    container_name: mxfacil_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_HOST:  db
    ports:
      - "3000:3000"   # HTTP (redirige a HTTPS)
      - "3443:3443"   # HTTPS
    volumes:
      - ./certs:/app/certs:ro   # Montar certificados externos en producción
    networks:
      - mxfacil_net

  # ─── phpMyAdmin ────────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: mxfacil_pma
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST:     db
      PMA_PORT:     3306
      PMA_USER:     root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
    ports:
      - "8081:80"
    networks:
      - mxfacil_net

volumes:
  db_data:

networks:
  mxfacil_net:
    driver: bridge
