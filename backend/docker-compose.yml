version: '3.9'

services:
  # ─── Base de Datos MySQL ───────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: mxfacil_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-mxfacil}
      MYSQL_USER:          ${MYSQL_USER:-mxfacil_user}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-mxfacil_pass}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - mxfacil_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Node.js con HTTPS ─────────────────────────────────────────────
  backend:
    build: .
    container_name: mxfacil_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:       production
      PORT:           3000
      HTTPS_PORT:     3443
      DB_HOST:        db
      DB_PORT:        3306
      DB_NAME:        ${MYSQL_DATABASE:-mxfacil}
      DB_USER:        ${MYSQL_USER:-mxfacil_user}
      DB_PASS:        ${MYSQL_PASSWORD:-mxfacil_pass}
      JWT_SECRET:     ${JWT_SECRET:-cambia_este_secreto_jwt_en_produccion}
      JWT_EXPIRES_IN: 7d
      # Clave AES-256 (64 chars hex) para cifrado simétrico
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2}
      # Clave HMAC para firmas digitales
      HMAC_SECRET:    ${HMAC_SECRET:-cambia_este_hmac_secret_en_produccion_minimo_32}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://localhost:5173}
    ports:
      - "3000:3000"   # HTTP (redirige a HTTPS)
      - "3443:3443"   # HTTPS
    volumes:
      - ./certs:/app/certs:ro   # Montar certificados externos en producción
    networks:
      - mxfacil_net

volumes:
  db_data:

networks:
  mxfacil_net:
    driver: bridge
